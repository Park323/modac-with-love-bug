<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>lovebug · PlayTest</title>
    <link rel="stylesheet" href="../common/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar__inner">
          <div class="brand">
            <div class="brand__mark" aria-hidden="true">LB</div>
            <div>
              <h1 class="brand__name">lovebug</h1>
              <p class="brand__meta">QA Automation Control</p>
            </div>
          </div>
          <nav class="nav" aria-label="lovebug 화면 이동">
            <a class="nav__link" href="../trigger/">Trigger</a>
            <a class="nav__link" href="../dashboard/">Dashboard</a>
            <a class="nav__link" href="../playtest/" aria-current="page">PlayTest</a>
          </nav>
        </div>
      </header>

      <main class="main">
        <section class="page-head">
          <div>
            <p class="eyebrow">PlayTest</p>
            <h2 class="page-title">로컬 JSON 시나리오를 골라 반복 재생하세요.</h2>
            <p class="page-copy">파일을 찾고 반복 횟수를 정한 뒤 시작하면 Manager가 한 이벤트씩 재생합니다.</p>
          </div>
          <div class="status-pill" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span data-status-text>대기 중</span>
          </div>
        </section>

        <section class="workspace">
          <form class="panel" data-playtest-form>
            <div class="panel__header">
              <div>
                <h3 class="panel__title">재생 설정</h3>
                <p class="panel__hint">로컬 JSON 시나리오와 반복 횟수를 지정합니다.</p>
              </div>
            </div>
            <div class="panel__body">
              <div class="form-stack">
                <label class="field">
                  <span class="label-row">
                    <span class="label">시나리오 JSON</span>
                    <span class="field-note">필수</span>
                  </span>
                  <input class="control" data-scenario-path type="text" placeholder="아직 선택 안 됨" readonly>
                </label>
                <button class="primary-button" type="button" data-browse>JSON 찾기</button>

                <label class="field" for="repeat-count">
                  <span class="label-row">
                    <span class="label">반복 횟수</span>
                    <span class="field-note">(예: 3)</span>
                  </span>
                  <div class="stepper" data-stepper>
                    <button type="button" data-step="down">−</button>
                    <input class="control" id="repeat-count" type="number" min="1" max="999" value="1" inputmode="numeric">
                    <button type="button" data-step="up">+</button>
                  </div>
                </label>

                <button class="primary-button" type="submit" data-start>시작</button>
                <button class="primary-button" type="button" data-stop>중단</button>
              </div>
            </div>
          </form>

          <aside class="panel" aria-label="재생 상태">
            <div class="panel__header">
              <div>
                <h3 class="panel__title">실행 모니터</h3>
                <p class="panel__hint">진행률, 반복/아이템 카운트, 로그.</p>
              </div>
            </div>
            <div class="panel__body">
              <div class="data-grid">
                <div class="metric">
                  <p class="metric__label">반복</p>
                  <p class="metric__value" data-metric-repeat>0 / 0</p>
                </div>
                <div class="metric">
                  <p class="metric__label">아이템</p>
                  <p class="metric__value" data-metric-item>0 / 0</p>
                </div>
                <div class="metric">
                  <p class="metric__label">상태</p>
                  <p class="metric__value" data-metric-state>idle</p>
                </div>
              </div>
              <div class="progress" aria-label="재생 진행률">
                <div class="progress__bar" data-progress></div>
              </div>
              <div class="activity-list" data-activity-list></div>
            </div>
          </aside>
        </section>
      </main>
    </div>
    <script src="../common/core.js"></script>
    <script src="../common/manager-api.js"></script>
    <script src="./playtest.js"></script>
  </body>
</html>
